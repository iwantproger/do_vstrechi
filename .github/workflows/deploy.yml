name: Deploy to Timeweb VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 12m
          script: |
            cd /opt/dovstrechi

            # Pull latest
            git fetch origin
            git reset --hard origin/main

            # Auto-update APP_VERSION and CHANGELOG from git log
            python3 scripts/update_version.py

            # Build and deploy
            docker compose build
            docker compose up -d

            # Apply migrations (idempotent — safe to re-run)
            echo "Applying migrations..."
            for f in $(ls database/migrations/*.sql | sort); do
              echo "  → $(basename $f)"
              docker compose exec -T postgres psql \
                -U ${POSTGRES_USER:-dovstrechi} \
                -d ${POSTGRES_DB:-dovstrechi} \
                -f /docker-entrypoint-initdb.d/migrations/$(basename $f) 2>&1 || true
            done

            # Health check
            sleep 5
            curl -sf http://localhost/health || echo "WARNING: Health check failed"

            echo "Deploy complete"
