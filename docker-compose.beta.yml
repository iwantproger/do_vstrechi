version: '3.9'

# ═══════════════════════════════════════════════════════════
# BETA-окружение «До встречи»
# Запуск: docker compose -f docker-compose.beta.yml --env-file .env.beta --project-name dovstrechi-beta up -d
# Или:    make beta-up
# ═══════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────
  # PostgreSQL Beta — отдельная БД от прода
  # ─────────────────────────────────────────────
  postgres_beta:
    image: postgres:16-alpine
    container_name: dovstrechi_postgres_beta
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dovstrechi_beta}
      POSTGRES_USER: ${POSTGRES_USER:-dovstrechi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_beta_data:/var/lib/postgresql/data
      - ${BETA_DIR:-/opt/dovstrechi-beta}/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ${BETA_DIR:-/opt/dovstrechi-beta}/database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - internal_beta
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dovstrechi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend Beta — FastAPI
  # ─────────────────────────────────────────────
  backend_beta:
    build:
      context: ${BETA_DIR:-/opt/dovstrechi-beta}/backend
      dockerfile: Dockerfile
    container_name: dovstrechi_backend_beta
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-dovstrechi}:${POSTGRES_PASSWORD}@postgres_beta:5432/${POSTGRES_DB:-dovstrechi_beta}}
      DATABASE_ADMIN_URL: postgresql://${POSTGRES_USER:-dovstrechi}:${POSTGRES_PASSWORD}@postgres_beta:5432/${POSTGRES_DB:-dovstrechi_beta}
      SECRET_KEY: ${SECRET_KEY}
      BOT_TOKEN: ${BOT_TOKEN}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      BOT_INTERNAL_URL: http://bot_beta:8080
      MINI_APP_URL: ${MINI_APP_URL:-https://beta.dovstrechiapp.ru}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://beta.dovstrechiapp.ru}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID:-0}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-2}
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-}
      ANONYMIZE_SALT: ${ANONYMIZE_SALT:-do-vstrechi-beta-2026}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      BOT_USERNAME: ${BOT_USERNAME:-}
      CALENDAR_WEBHOOK_URL: ${CALENDAR_WEBHOOK_URL:-}
    depends_on:
      postgres_beta:
        condition: service_healthy
    networks:
      - internal_beta
      - shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────
  # Redis Beta — FSM storage для бота
  # ─────────────────────────────────────────────
  redis_beta:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: dovstrechi_redis_beta
    restart: unless-stopped
    networks:
      - internal_beta
    volumes:
      - redis_beta_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # Bot Beta — aiogram 3.x (отдельный BOT_TOKEN!)
  # ─────────────────────────────────────────────
  bot_beta:
    build:
      context: ${BETA_DIR:-/opt/dovstrechi-beta}/bot
      dockerfile: Dockerfile
    container_name: dovstrechi_bot_beta
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BACKEND_API_URL: http://backend_beta:8000
      MINI_APP_URL: ${MINI_APP_URL:-https://beta.dovstrechiapp.ru}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      REDIS_URL: redis://redis_beta:6379/0
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-true}
      WEBHOOK_HOST: ${WEBHOOK_HOST:-https://beta.dovstrechiapp.ru}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/bot/webhook}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      BOT_USERNAME: ${BOT_USERNAME:-beta_do_vstrechi_bot}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID:-0}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
    expose:
      - "8080"
    depends_on:
      backend_beta:
        condition: service_healthy
      redis_beta:
        condition: service_healthy
    networks:
      - internal_beta
      - shared

  # ─────────────────────────────────────────────
  # Support Bot
  # ─────────────────────────────────────────────
  support_bot_beta:
    # Gated behind the "support" profile — beta does not set SUPPORT_BOT_TOKEN
    # so the container was stuck in a restart loop. Start explicitly with
    # `docker compose --profile support up -d support_bot_beta` when needed.
    profiles:
      - support
    build:
      context: ${BETA_DIR:-/opt/dovstrechi-beta}/support-bot
      dockerfile: Dockerfile
    container_name: dovstrechi_support_bot_beta
    restart: unless-stopped
    environment:
      SUPPORT_BOT_TOKEN: ${SUPPORT_BOT_TOKEN}
      ADMIN_CHAT_ID: ${ADMIN_TELEGRAM_ID}
      ADMIN_IDS: ${ADMIN_TELEGRAM_ID}
    networks:
      - internal_beta

volumes:
  postgres_beta_data:
  redis_beta_data:

networks:
  internal_beta:
    driver: bridge
  shared:
    external: true
    name: dovstrechi_shared
