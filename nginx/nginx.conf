worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    server_tokens off;

    # Rate limiting
    limit_req_zone $remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $remote_addr zone=booking:10m rate=5r/m;
    limit_req_zone $remote_addr zone=admin:10m rate=5r/s;
    limit_req_zone $remote_addr zone=admin_auth:10m rate=3r/m;

    # Docker DNS resolver (для lazy-resolve beta backend)
    resolver 127.0.0.11 valid=30s;

    # ═══════════════════════════════════════════════════════
    # HTTP → HTTPS redirect (оба домена)
    # ═══════════════════════════════════════════════════════
    server {
        listen 80;
        server_name dovstrechiapp.ru www.dovstrechiapp.ru beta.dovstrechiapp.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════
    # PROD: dovstrechiapp.ru
    # ═══════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        server_name dovstrechiapp.ru www.dovstrechiapp.ru;

        ssl_certificate     /etc/letsencrypt/live/dovstrechiapp.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dovstrechiapp.ru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://telegram.org https://oauth.telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https:; frame-src https://oauth.telegram.org; frame-ancestors https://web.telegram.org https://*.telegram.org;" always;
        add_header Cache-Control "no-cache, must-revalidate" always;

        root  /usr/share/nginx/html;
        index index.html;

        # ── Admin panel ──────────────────────────────

        location /admin/ {
            alias /usr/share/nginx/html/admin/;
            try_files $uri $uri/ /admin/index.html;
            add_header X-Robots-Tag "noindex, nofollow" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://telegram.org https://oauth.telegram.org https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https:; frame-src https://oauth.telegram.org; frame-ancestors 'none';" always;
            add_header Cache-Control "no-cache, must-revalidate" always;
        }

        location /api/admin/auth/ {
            limit_req zone=admin_auth burst=2 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/admin/ {
            limit_req zone=admin burst=10 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/events {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Google OAuth callback (no strict rate limit) ─
        location /api/calendar/google/callback {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Google Calendar webhook (push notifications) ─
        location /api/calendar/webhook/google {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
        }

        # ── Legal pages (no auth, no SPA redirect) ───

        location = /privacy {
            try_files /privacy.html =404;
            add_header Cache-Control "public, max-age=86400" always;
        }
        location = /terms {
            try_files /terms.html =404;
            add_header Cache-Control "public, max-age=86400" always;
        }
        location = /google6eb70911ad60f85e.html {
            try_files $uri =404;
            add_header Content-Type "text/html" always;
        }
        location = /google64ad39bb553864ce.html {
            try_files $uri =404;
            add_header Content-Type "text/html" always;
        }

        # ── Bot webhook (Telegram → nginx → bot:8080) ─
        location /bot/webhook {
            proxy_pass         http://bot:8080/bot/webhook;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 1m;
            proxy_read_timeout 60s;
        }

        # ── Main app ─────────────────────────────────

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/bookings {
            limit_req zone=booking burst=3 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://backend:8000/health;
        }
    }

    # ═══════════════════════════════════════════════════════
    # BETA: beta.dovstrechiapp.ru
    # ═══════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        server_name beta.dovstrechiapp.ru;

        ssl_certificate     /etc/letsencrypt/live/dovstrechiapp.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dovstrechiapp.ru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://telegram.org https://oauth.telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https:; frame-src https://oauth.telegram.org; frame-ancestors https://web.telegram.org https://*.telegram.org;" always;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Environment "beta" always;

        root  /usr/share/nginx/html-beta;
        index index.html;

        # Custom error page — beta offline
        error_page 502 503 504 /beta_offline.html;
        location = /beta_offline.html {
            default_type text/html;
            return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Beta offline</title></head><body style="font-family:system-ui;text-align:center;padding:80px 20px"><h1>Beta is offline</h1><p>Beta-окружение сейчас недоступно. Prod работает: <a href="https://dovstrechiapp.ru">dovstrechiapp.ru</a></p></body></html>';
        }

        # ── Admin panel (beta) ───────────────────────

        location /admin/ {
            alias /usr/share/nginx/html-beta/admin/;
            try_files $uri $uri/ /admin/index.html;
            add_header X-Robots-Tag "noindex, nofollow" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://telegram.org https://oauth.telegram.org https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https:; frame-src https://oauth.telegram.org; frame-ancestors 'none';" always;
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header X-Environment "beta" always;
        }

        location /api/admin/auth/ {
            limit_req zone=admin_auth burst=2 nodelay;
            set $beta_backend http://backend_beta:8000;
            proxy_pass         $beta_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/admin/ {
            limit_req zone=admin burst=10 nodelay;
            set $beta_backend http://backend_beta:8000;
            proxy_pass         $beta_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/events {
            limit_req zone=api burst=20 nodelay;
            set $beta_backend http://backend_beta:8000;
            proxy_pass         $beta_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Google OAuth callback (beta, no strict rate limit)
        location /api/calendar/google/callback {
            set $beta_backend http://backend_beta:8000;
            proxy_pass         $beta_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Google Calendar webhook (beta, push notifications)
        location /api/calendar/webhook/google {
            set $beta_backend http://backend_beta:8000;
            proxy_pass         $beta_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
        }

        # ── Legal pages (beta) ───────────────────────

        location = /privacy {
            try_files /privacy.html =404;
            add_header Cache-Control "public, max-age=86400" always;
        }
        location = /terms {
            try_files /terms.html =404;
            add_header Cache-Control "public, max-age=86400" always;
        }

        # ── Bot webhook beta (Telegram → nginx → bot_beta:8080) ─
        location /bot/webhook {
            set $beta_bot http://bot_beta:8080;
            proxy_pass         $beta_bot/bot/webhook;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 1m;
            proxy_read_timeout 60s;
        }

        # ── Main app (beta) ──────────────────────────

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $beta_backend http://backend_beta:8000;
            proxy_pass         $beta_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/bookings {
            limit_req zone=booking burst=3 nodelay;
            set $beta_backend http://backend_beta:8000;
            proxy_pass         $beta_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /health {
            set $beta_backend http://backend_beta:8000;
            proxy_pass $beta_backend/health;
        }
    }
}
