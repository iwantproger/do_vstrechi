worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ─────────────────────────────────────────────
    # HTTP → redirect to HTTPS
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN.ru www.YOUR_DOMAIN.ru;

        # Для certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────
    # HTTPS
    # ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN.ru www.YOUR_DOMAIN.ru;

        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.ru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Статика фронтенда
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Проксирование API на backend
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Health
        location /health {
            proxy_pass http://backend:8000/health;
        }
    }
}
