version: '3.9'

services:

  # ─────────────────────────────────────────────
  # PostgreSQL — хранилище данных (152-ФЗ: РФ-сервер)
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dovstrechi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dovstrechi}
      POSTGRES_USER: ${POSTGRES_USER:-dovstrechi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dovstrechi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend — FastAPI
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dovstrechi_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dovstrechi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-dovstrechi}
      SECRET_KEY: ${SECRET_KEY}
      BOT_TOKEN: ${BOT_TOKEN}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      BOT_INTERNAL_URL: ${BOT_INTERNAL_URL:-http://bot:8080}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID:-0}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-2}
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-}
      ANONYMIZE_SALT: ${ANONYMIZE_SALT:-do-vstrechi-2026}
      MINI_APP_URL: ${MINI_APP_URL:-https://dovstrechiapp.ru}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://dovstrechiapp.ru}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      BOT_USERNAME: ${BOT_USERNAME:-}
      CALENDAR_WEBHOOK_URL: ${CALENDAR_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────
  # Redis — FSM storage для бота
  # ─────────────────────────────────────────────
  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: dovstrechi_redis
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # Bot — aiogram 3.x
  # ─────────────────────────────────────────────
  bot:
    profiles: ["archived"]
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: dovstrechi_bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BACKEND_API_URL: http://backend:8000
      MINI_APP_URL: ${MINI_APP_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-true}
      WEBHOOK_HOST: ${WEBHOOK_HOST:-https://dovstrechiapp.ru}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/bot/webhook}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      BOT_USERNAME: ${BOT_USERNAME:-do_vstrechi_bot}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID:-0}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
    extra_hosts:
      - "api.telegram.org:149.154.166.110"
      - "api1.telegram.org:149.154.167.99"
      - "api2.telegram.org:149.154.167.99"
      - "api3.telegram.org:149.154.167.99"
      - "api4.telegram.org:149.154.167.99"
      - "api5.telegram.org:149.154.167.99"
    expose:
      - "8080"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ─────────────────────────────────────────────
  # Nginx — reverse proxy + статика frontend
  # ─────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: dovstrechi_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html
      - ./admin:/usr/share/nginx/html/admin:ro
      # Beta frontend (из git worktree; Docker создаст пустые dirs если worktree ещё нет)
      - ${BETA_DIR:-/opt/dovstrechi-beta}/frontend:/usr/share/nginx/html-beta
      - ${BETA_DIR:-/opt/dovstrechi-beta}/admin:/usr/share/nginx/html-beta/admin:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - internal
      - shared

  # ─────────────────────────────────────────────
  # Certbot — SSL Let's Encrypt (запускать вручную)
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: dovstrechi_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    profiles:
      - ssl

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
  shared:
    external: true
    name: dovstrechi_shared
